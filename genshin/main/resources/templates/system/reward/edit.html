<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改原神怪物掉落奖励')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-reward-edit" th:object="${genshinEnemyReward}">
            <input name="id" th:field="*{id}" type="hidden">
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">怪物ID：</label>
                    <div class="col-sm-8">
                        <input name="enemyId" th:field="*{enemyId}" class="form-control" type="text" required>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">物品ID：</label>
                    <div class="col-sm-8">
                        <input name="itemId" th:field="*{itemId}" class="form-control" type="text" required>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">物品名称：</label>
                    <div class="col-sm-8">
                        <input name="itemName" th:field="*{itemName}" class="form-control" type="text" required>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">掉落数量：</label>
                    <div class="col-sm-8">
                        <input name="itemCount" th:field="*{itemCount}" class="form-control" type="text">
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">物品稀有度：</label>
                    <div class="col-sm-8">
                        <input name="itemRarity" th:field="*{itemRarity}" class="form-control" type="text">
                    </div>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "system/reward";
        $("#form-reward-edit").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-reward-edit').serialize());
            }
        }
    </script>
</body>
</html>
