<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('【请填写功能名称】列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>队伍名称(如: 雷九万班 / 神鹤万心)：</label>
                                <input type="text" name="teamName"/>
                            </li>
                            <li>
                                <label>1号位角色(主C)：</label>
                                <select name="char1Id">
                                    <option value="">所有</option>
                                </select>
                            </li>
                            <li>
                                <label>2号位角色(副C)：</label>
                                <select name="char2Id">
                                    <option value="">所有</option>
                                </select>
                            </li>
                            <li>
                                <label>3号位角色(增伤/辅助)：</label>
                                <select name="char3Id">
                                    <option value="">所有</option>
                                </select>
                            </li>
                            <li>
                                <label>4号位角色(生存/盾奶)：</label>
                                <select name="char4Id">
                                    <option value="">所有</option>
                                </select>
                            </li>
                            <li>
                                <label>元素共鸣效果：</label>
                                <input type="text" name="teamBonus"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:team:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:team:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:team:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:team:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:team:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:team:remove')}]];
        var prefix = ctx + "system/team";
        var characterData = [];

        // 加载角色列表
        function loadCharacters() {
            $.ajax({
                url: ctx + "system/character/list",
                type: "post",
                data: {pageNum: 1, pageSize: 1000},
                success: function(result) {
                    if (result.code == 0) {
                        characterData = result.rows;
                        initCharacterSelects();
                        // 角色数据加载完成后，刷新表格显示
                        $('#bootstrap-table').bootstrapTable('refresh');
                    }
                }
            });
        }

        // 初始化角色下拉框
        function initCharacterSelects() {
            var selects = ['char1Id', 'char2Id', 'char3Id', 'char4Id'];
            selects.forEach(function(selectName) {
                var select = $('select[name="' + selectName + '"]');
                characterData.forEach(function(char) {
                    select.append('<option value="' + char.id + '">' + char.name + '</option>');
                });
            });
        }

        // 根据角色ID获取角色名称
        function getCharacterName(charId) {
            if (!charId) return '-';
            if (characterData.length === 0) return charId; // 如果角色数据未加载，直接显示ID
            var char = characterData.find(function(c) { return c.id == charId; });
            return char ? char.name : charId;
        }

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "配队推荐",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'teamName',
                    title: '队伍名称(如: 雷九万班 / 神鹤万心)'
                },
                {
                    field: 'char1Id',
                    title: '1号位角色(主C)',
                    formatter: function(value, row, index) {
                        return getCharacterName(value);
                    }
                },
                {
                    field: 'char2Id',
                    title: '2号位角色(副C)',
                    formatter: function(value, row, index) {
                        return getCharacterName(value);
                    }
                },
                {
                    field: 'char3Id',
                    title: '3号位角色(增伤/辅助)',
                    formatter: function(value, row, index) {
                        return getCharacterName(value);
                    }
                },
                {
                    field: 'char4Id',
                    title: '4号位角色(生存/盾奶)',
                    formatter: function(value, row, index) {
                        return getCharacterName(value);
                    }
                },
                {
                    field: 'teamBonus',
                    title: '元素共鸣效果'
                },
                {
                    field: 'rotation',
                    title: '输出手法/队伍简评'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
            
            // 表格初始化后再加载角色数据
            loadCharacters();
        });
    </script>
</body>
</html>
