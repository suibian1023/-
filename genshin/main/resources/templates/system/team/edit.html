<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改配队推荐')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-team-edit" th:object="${genshinRecommendTeam}">
            <input name="id" th:field="*{id}" type="hidden">
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">队伍名称(如: 雷九万班 / 神鹤万心)：</label>
                    <div class="col-sm-8">
                        <input name="teamName" th:field="*{teamName}" class="form-control" type="text" required>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">1号位角色(主C)：</label>
                    <div class="col-sm-8">
                        <select name="char1Id" class="form-control" required th:attr="data-current-value=*{char1Id}">
                            <option value="">请选择角色</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">2号位角色(副C)：</label>
                    <div class="col-sm-8">
                        <select name="char2Id" class="form-control" th:attr="data-current-value=*{char2Id}">
                            <option value="">请选择角色</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">3号位角色(增伤/辅助)：</label>
                    <div class="col-sm-8">
                        <select name="char3Id" class="form-control" th:attr="data-current-value=*{char3Id}">
                            <option value="">请选择角色</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">4号位角色(生存/盾奶)：</label>
                    <div class="col-sm-8">
                        <select name="char4Id" class="form-control" th:attr="data-current-value=*{char4Id}">
                            <option value="">请选择角色</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">元素共鸣效果：</label>
                    <div class="col-sm-8">
                        <input name="teamBonus" th:field="*{teamBonus}" class="form-control" type="text">
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">输出手法/队伍简评：</label>
                    <div class="col-sm-8">
                        <textarea name="rotation" class="form-control">[[*{rotation}]]</textarea>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "system/team";
        
        // 加载角色列表并设置当前值
        $.ajax({
            url: ctx + "system/character/list",
            type: "post",
            data: {pageNum: 1, pageSize: 1000},
            success: function(result) {
                if (result.code == 0) {
                    var characterData = result.rows;
                    var selects = ['char1Id', 'char2Id', 'char3Id', 'char4Id'];
                    selects.forEach(function(selectName) {
                        var select = $('select[name="' + selectName + '"]');
                        var currentValue = select.attr('data-current-value');
                        characterData.forEach(function(char) {
                            var selected = char.id == currentValue ? 'selected' : '';
                            select.append('<option value="' + char.id + '" ' + selected + '>' + char.name + '</option>');
                        });
                    });
                }
            }
        });
        
        $("#form-team-edit").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-team-edit').serialize());
            }
        }
    </script>
</body>
</html>
