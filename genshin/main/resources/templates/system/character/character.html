<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('原神角色基础信息列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>角色名称：</label>
                                <input type="text" name="name"/>
                            </li>
                            <li>
                                <label>角色称号：</label>
                                <input type="text" name="title"/>
                            </li>
                            <li>
                                <label>武器类型名称：</label>
                                <input type="text" name="weaponText"/>
                            </li>
                            <li>
                                <label>性别：</label>
                                <input type="text" name="gender"/>
                            </li>
                            <li>
                                <label>星级：</label>
                                <input type="text" name="rarity"/>
                            </li>
                            <li>
                                <label>生日月日：</label>
                                <input type="text" name="birthdayMmdd"/>
                            </li>
                            <li>
                                <label>生日：</label>
                                <input type="text" name="birthday"/>
                            </li>
                            <li>
                                <label>元素名称：</label>
                                <input type="text" name="elementText"/>
                            </li>
                            <li>
                                <label>所属组织：</label>
                                <input type="text" name="affiliation"/>
                            </li>
                            <li>
                                <label>地区：</label>
                                <input type="text" name="region"/>
                            </li>
                            <li>
                                <label>副属性名称：</label>
                                <input type="text" name="substatText"/>
                            </li>
                            <li>
                                <label>命之座：</label>
                                <input type="text" name="constellation"/>
                            </li>
                            <li>
                                <label>中文CV：</label>
                                <input type="text" name="cvChinese"/>
                            </li>
                            <li>
                                <label>英文CV：</label>
                                <input type="text" name="cvEnglish"/>
                            </li>
                            <li>
                                <label>日文CV：</label>
                                <input type="text" name="cvJapanese"/>
                            </li>
                            <li>
                                <label>韩文CV：</label>
                                <input type="text" name="cvKorean"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:character:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:character:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:character:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:character:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:character:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:character:remove')}]];
        var prefix = ctx + "system/character";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "原神角色基础信息",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'id',
                    title: '角色唯一ID',
                    visible: false
                },
                {
                    field: 'name',
                    title: '角色名称'
                },
                {
                    field: 'title',
                    title: '角色称号'
                },
                {
                    field: 'description',
                    title: '角色描述'
                },
                {
                    field: 'weaponType',
                    title: '武器类型编码'
                },
                {
                    field: 'weaponText',
                    title: '武器类型名称'
                },
                {
                    field: 'bodyType',
                    title: '体型编码'
                },
                {
                    field: 'gender',
                    title: '性别'
                },
                {
                    field: 'qualityType',
                    title: '品质编码'
                },
                {
                    field: 'rarity',
                    title: '星级'
                },
                {
                    field: 'birthdayMmdd',
                    title: '生日月日'
                },
                {
                    field: 'birthday',
                    title: '生日'
                },
                {
                    field: 'elementType',
                    title: '元素编码'
                },
                {
                    field: 'elementText',
                    title: '元素名称'
                },
                {
                    field: 'affiliation',
                    title: '所属组织'
                },
                {
                    field: 'associationType',
                    title: '阵营类型'
                },
                {
                    field: 'region',
                    title: '地区'
                },
                {
                    field: 'substatType',
                    title: '副属性编码'
                },
                {
                    field: 'substatText',
                    title: '副属性名称'
                },
                {
                    field: 'constellation',
                    title: '命之座'
                },
                {
                    field: 'cvChinese',
                    title: '中文CV'
                },
                {
                    field: 'cvEnglish',
                    title: '英文CV'
                },
                {
                    field: 'cvJapanese',
                    title: '日文CV'
                },
                {
                    field: 'cvKorean',
                    title: '韩文CV'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
