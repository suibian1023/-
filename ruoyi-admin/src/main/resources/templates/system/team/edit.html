<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改【请填写功能名称】')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-team-edit" th:object="${genshinRecommendTeam}">
            <input name="id" th:field="*{id}" type="hidden">
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">队伍名称(如: 雷九万班 / 神鹤万心)：</label>
                    <div class="col-sm-8">
                        <input name="teamName" th:field="*{teamName}" class="form-control" type="text" required>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">1号位角色(主C)：</label>
                    <div class="col-sm-8">
                        <select name="char1Id" class="form-control" required>
                            <option value="">--- 请选择角色 ---</option>
                            <option th:each="character : ${characterList}" 
                                    th:value="${character.id}" 
                                    th:text="${character.name}"
                                    th:selected="${character.id == genshinRecommendTeam.char1Id}"></option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">2号位角色(副C)：</label>
                    <div class="col-sm-8">
                        <select name="char2Id" class="form-control">
                            <option value="">--- 请选择角色 ---</option>
                            <option th:each="character : ${characterList}" 
                                    th:value="${character.id}" 
                                    th:text="${character.name}"
                                    th:selected="${character.id == genshinRecommendTeam.char2Id}"></option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">3号位角色(增伤/辅助)：</label>
                    <div class="col-sm-8">
                        <select name="char3Id" class="form-control">
                            <option value="">--- 请选择角色 ---</option>
                            <option th:each="character : ${characterList}" 
                                    th:value="${character.id}" 
                                    th:text="${character.name}"
                                    th:selected="${character.id == genshinRecommendTeam.char3Id}"></option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">4号位角色(生存/盾奶)：</label>
                    <div class="col-sm-8">
                        <select name="char4Id" class="form-control">
                            <option value="">--- 请选择角色 ---</option>
                            <option th:each="character : ${characterList}" 
                                    th:value="${character.id}" 
                                    th:text="${character.name}"
                                    th:selected="${character.id == genshinRecommendTeam.char4Id}"></option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">元素共鸣效果：</label>
                    <div class="col-sm-8">
                        <input name="teamBonus" th:field="*{teamBonus}" class="form-control" type="text">
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">输出手法/队伍简评：</label>
                    <div class="col-sm-8">
                        <textarea name="rotation" class="form-control">[[*{rotation}]]</textarea>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "system/team";
        $("#form-team-edit").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-team-edit').serialize());
            }
        }
    </script>
</body>
</html>
