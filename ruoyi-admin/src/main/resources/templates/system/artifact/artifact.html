<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('【请填写功能名称】列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>角色ID：</label>
                                <input type="text" name="characterId"/>
                            </li>
                            <li>
                                <label>推荐圣遗物套装ID：</label>
                                <input type="text" name="artifactId"/>
                            </li>
                            <li>
                                <label>件套需求: 4件套/2件套：</label>
                                <input type="text" name="pieces"/>
                            </li>
                            <li>
                                <label>沙漏主词条推荐(如: 攻击力/充能)：</label>
                                <input type="text" name="sandStat"/>
                            </li>
                            <li>
                                <label>杯子主词条推荐(如: 冰元素伤害/物理伤害)：</label>
                                <input type="text" name="cupStat"/>
                            </li>
                            <li>
                                <label>头冠主词条推荐(如: 暴击率/暴击伤害)：</label>
                                <input type="text" name="crownStat"/>
                            </li>
                            <li>
                                <label>副词条优先级(如: 双暴>攻击>充能)：</label>
                                <input type="text" name="subStats"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:artifact:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:artifact:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:artifact:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:artifact:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:artifact:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:artifact:remove')}]];
        var prefix = ctx + "system/artifact";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "【请填写功能名称】",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'id',
                    title: '${comment}',
                    visible: false
                },
                {
                    field: 'characterId',
                    title: '角色ID'
                },
                {
                    field: 'artifactId',
                    title: '推荐圣遗物套装ID'
                },
                {
                    field: 'pieces',
                    title: '件套需求: 4件套/2件套'
                },
                {
                    field: 'sandStat',
                    title: '沙漏主词条推荐(如: 攻击力/充能)'
                },
                {
                    field: 'cupStat',
                    title: '杯子主词条推荐(如: 冰元素伤害/物理伤害)'
                },
                {
                    field: 'crownStat',
                    title: '头冠主词条推荐(如: 暴击率/暴击伤害)'
                },
                {
                    field: 'subStats',
                    title: '副词条优先级(如: 双暴>攻击>充能)'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
